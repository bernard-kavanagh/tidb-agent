<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — TiDB Cloud Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#18181b;border:1px solid #2a2a2a;border-radius:16px;
padding:48px 44px 40px;text-align:center;max-width:400px;width:90%;
border-top:3px solid #DC150B;box-shadow:0 0 60px rgba(220,21,11,0.08)}
.logo{height:32px;margin-bottom:24px}
h1{font-size:20px;font-weight:600;margin-bottom:8px;letter-spacing:-0.3px}
p{font-size:14px;color:#888;margin-bottom:32px;line-height:1.5}
.google-btn{display:inline-flex;align-items:center;gap:10px;
background:#fff;color:#1f1f1f;font-size:14px;font-weight:600;
padding:12px 24px;border-radius:8px;text-decoration:none;
transition:box-shadow 0.15s;border:1px solid #ddd}
.google-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.google-btn svg{width:18px;height:18px;flex-shrink:0}
.err{display:none;margin-top:20px;font-size:13px;color:#ef4444;
background:rgba(239,68,68,0.1);padding:10px 16px;border-radius:8px}
</style>
</head>
<body>
<div class="card">
<img class="logo" src="https://static.pingcap.com/files/2022/08/07073128/logo-TiDB-1.svg" alt="TiDB">
<h1>TiDB Cloud Lead Pipeline</h1>
<p>Sign in with your @pingcap.com Google account<br>to access the dashboard.</p>
<a href="/auth/google" class="google-btn">
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
</svg>
Sign in with Google
</a>
<p id="err" class="err"></p>
</div>
<script>
var p = new URLSearchParams(location.search);
var e = p.get("error");
if (e) {
  var el = document.getElementById("err");
  el.style.display = "block";
  el.textContent = e === "domain"
    ? "Access restricted to @pingcap.com accounts"
    : "Authentication failed. Please try again.";
}
</script>
</body>
</html>
